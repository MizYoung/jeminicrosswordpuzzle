<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>말랑말랑 가로세로 낱말퀴즈 🧩</title>
    <style>
        :root {
            --primary-color: #ff7675;
            --secondary-color: #74b9ff;
            --background-color: #f7f9fc;
            --box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }

        body {
            font-family: 'Nanum Gothic', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2d3436;
        }

        h1 {
            color: #6c5ce7;
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px #ffeaa7;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 25px;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            background: white;
            padding: 25px;
            border-radius: 24px;
            box-shadow: var(--box-shadow);
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
            gap: 25px;
        }

        @media (min-width: 768px) {
            .game-container {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        /* 퍼즐판 스타일 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 55px);
            grid-template-rows: repeat(5, 55px);
            gap: 6px;
            background-color: #dfe6e9;
            padding: 10px;
            border-radius: 16px;
            justify-content: center;
            margin: 0 auto;
        }

        .cell {
            position: relative;
            background-color: #fff;
            border: 2px solid #b2bec3;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cell.empty {
            background-color: #dfe6e9;
            border: none;
        }

        .cell input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #2d3436;
            border-radius: 6px;
            text-transform: uppercase;
            outline: none;
        }

        .cell input:focus {
            background-color: #ffeaa7;
        }

        /* 문제 번호 라벨 */
        .cell-number {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #0984e3;
            z-index: 10;
        }

        /* 힌트 영역 스타일 */
        .clues-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .clue-section {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 12px;
        }

        .clue-section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #2f3542;
            border-bottom: 2px solid #ced6e0;
            padding-bottom: 5px;
            font-size: 1.1rem;
        }

        .clue-item {
            font-size: 0.95rem;
            margin: 6px 0;
            line-height: 1.4;
        }

        .clue-number {
            font-weight: bold;
            color: #e84393;
            margin-right: 5px;
        }

        /* 버튼 및 결과 영역 */
        .button-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 10px;
            gap: 15px;
        }

        .btn {
            background-color: #1dd1a1;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #10ac84;
            transform: translateY(-2px);
        }

        .result-message {
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            text-align: center;
        }
        
        .success { color: #10ac84; }
        .wrong { color: #ee5253; }
    </style>
</head>
<body>

    <h1>말랑말랑 가로세로 낱말퀴즈 🧩</h1>
    <p class="subtitle">알맞은 글자를 빈칸에 넣고 정답을 확인해봐요!</p>

    <div class="game-container">
        <div class="grid-container" id="grid"></div>

        <div class="clues-container">
            <div class="clue-section">
                <h3>↔️ 가로 열쇠</h3>
                <div class="clue-item"><span class="clue-number">①</span> 가을이 되면 빨갛게 익는 달콤한 과일이에요.</div>
                <div class="clue-item"><span class="clue-number">③</span> 하늘을 호랑나비처럼 예쁘게 날아다니는 곤충이에요.</div>
            </div>
            <div class="clue-section">
                <h3>↕️ 세로 열쇠</h3>
                <div class="clue-item"><span class="clue-number">①</span> 생각하고 말을 할 수 있는 우리 같은 존재예요.</div>
                <div class="clue-item"><span class="clue-number">②</span> 가게에서 파는 바삭바삭하고 맛있는 간식이에요.</div>
            </div>
        </div>
    </div>

    <div class="button-area">
        <button class="btn" onclick="checkAnswers()">정답 확인하기! ✨</button>
        <div class="result-message" id="result-msg"></div>
    </div>

    <script>
        // 5x5 그리드 레이아웃 설정 (null은 빈 공간, 문자는 정답)
        // 1번 가로: 사과 / 1번 세로: 사람 / 2번 세로: 과자 / 3번 가로: 나비 를 배치한 예시입니다.
        const solutionGrid = [
            ['사', '과', null, null, null],
            ['람', '자', null, null, null],
            [null, '나', '비', null, null],
            [null, null, null, null, null],
            [null, null, null, null, null]
        ];

        // 특정 위치에 올 숫자를 매핑 (문제 번호 표시용)
        const cellNumbers = {
            "0,0": "1", // 사 (가로1, 세로1의 시작)
            "0,1": "2", // 과 (세로2의 시작)
            "2,1": "3"  // 나 (가로3의 시작)
        };

        const gridElement = document.getElementById('grid');

        // 그리드 생성 로직
        for (let r = 0; r < 5; r++) {
            for (let c = 0; c < 5; c++) {
                const cellDiv = document.createElement('div');
                
                if (solutionGrid[r][c] === null) {
                    cellDiv.className = 'cell empty';
                } else {
                    cellDiv.className = 'cell';
                    
                    // 번호 표시가 필요한 칸이면 숫자를 넣어줌
                    const coordKey = `${r},${c}`;
                    if (cellNumbers[coordKey]) {
                        const numSpan = document.createElement('span');
                        numSpan.className = 'cell-number';
                        numSpan.innerText = cellNumbers[coordKey];
                        cellDiv.appendChild(numSpan);
                    }

                    // 입력창 생성
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.maxLength = 1;
                    // 위치 식별을 위한 dataset 저장
                    input.dataset.row = r;
                    input.dataset.col = c;
                    
                    cellDiv.appendChild(input);
                }
                gridElement.appendChild(cellDiv);
            }
        }

        // 정답 체크 함수
        function checkAnswers() {
            const inputs = document.querySelectorAll('.cell input');
            let isAllCorrect = true;
            let hasEmpty = false;

            inputs.forEach(input => {
                const r = input.dataset.row;
                const c = input.dataset.col;
                const userAnswer = input.value.trim();
                const correctAnswer = solutionGrid[r][c];

                if (userAnswer === "") {
                    hasEmpty = true;
                    isAllCorrect = false;
                } else if (userAnswer !== correctAnswer) {
                    isAllCorrect = false;
                }
            });

            const resultMsg = document.getElementById('result-msg');
            if (hasEmpty) {
                resultMsg.className = "result-message wrong";
                resultMsg.innerText = "⚠️ 아직 안 채운 칸이 있어요! 모두 채워보세요.";
            } else if (isAllCorrect) {
                resultMsg.className = "result-message success";
                resultMsg.innerText = "🎉 대단해요! 모든 문제를 맞혔어요! 참 잘했어요! 👍";
            } else {
                resultMsg.className = "result-message wrong";
                resultMsg.innerText = "❌ 틀린 글자가 있어요. 다시 한번 생각해볼까요?";
            }
        }
    </script>
</body>
</html>
